<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --bg: #f9f9f7;
            --surface: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --text: #1a1a1a;
        }

        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .decoration {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            z-index: 0;
        }

        .container {
            width: 850px;
            height: 850px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.03);
            text-align: center;
        }

        .tag {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 50px;
            color: var(--text);
        }

        .description {
            font-size: 32px;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.6);
            max-width: 700px;
            position: relative;
        }

        .description::before {
            content: '';
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 1px;
            background: var(--primary);
        }

        .footer {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .brand {
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 3px;
        }

        .divider {
            width: 1px; height: 15px;
            background: var(--primary);
        }

        .year {
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="decoration"></div>
    <div class="container">
        <div class="tag" id="tag-text">SOLAR INTEGRATION</div>
        <div class="title" id="main-title">Elegância Minimalista em Movimento</div>
        <div class="description" id="main-desc">
            A união perfeita entre tecnologia sustentável e design focado no ser humano.
        </div>
        <div class="footer">
            <div class="brand">CREATA ARCHITECT</div>
            <div class="divider"></div>
            <div class="year">2026</div>
        </div>
    </div>

    <script>
        function setContent(title, desc, tag) {
            document.getElementById('main-title').innerText = title;
            document.getElementById('main-desc').innerText = desc;
            if(tag) document.getElementById('tag-text').innerText = tag;
        }
    </script>
</body>
</html>
