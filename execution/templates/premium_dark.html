<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff5e00;
            --bg: #050505;
            --surface: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .glow {
            position: absolute;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 94, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            filter: blur(80px);
            z-index: 0;
        }

        .container {
            width: 900px;
            height: 900px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .tag-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .tag-line {
            width: 40px;
            height: 2px;
            background: var(--primary);
        }

        .tag {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 85px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 30px;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            max-width: 700px;
            border-left: 3px solid var(--primary);
            padding-left: 30px;
        }

        .footer {
            position: absolute;
            bottom: 60px;
            right: 80px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .brand {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            color: #fff;
        }

        .year {
            font-size: 14px;
            color: var(--primary);
            font-weight: 400;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="tag-row">
            <div class="tag-line"></div>
            <div class="tag" id="tag-text">Design Intelligence</div>
        </div>
        <div class="title" id="main-title">A Nova Fronteira do Design Visual</div>
        <div class="description" id="main-desc">
            Sistemas cognitivos e neuroestética aplicados à construção de autoridade digital em 2026.
        </div>
        <div class="footer">
            <div class="brand">CREATA ARCHITECT</div>
            <div class="year">EST. 2026</div>
        </div>
    </div>

    <script>
        function setContent(title, desc, tag) {
            document.getElementById('main-title').innerText = title;
            document.getElementById('main-desc').innerText = desc;
            if(tag) document.getElementById('tag-text').innerText = tag;
        }
    </script>
</body>
</html>
