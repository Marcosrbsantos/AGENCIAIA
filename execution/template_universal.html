<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap');

body {
    margin: 0; padding: 0;
    width: 1080px; height: 1080px;
    background-color: #0c0c0c;
    font-family: 'Inter', sans-serif;
    color: #ffffff;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    position: relative; overflow: hidden;
}

.glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(255,106,0,0.2) 0%, transparent 70%);
    z-index: 1;
}

.content {
    position: relative; z-index: 10;
    text-align: center;
    padding: 60px;
}

.tag {
    background-color: #ff6a00;
    color: #000;
    padding: 10px 25px;
    font-weight: 900;
    font-size: 24px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 40px;
}

.title {
    font-family: 'Anton', sans-serif;
    font-size: 100px;
    line-height: 0.9;
    text-transform: uppercase;
    margin-bottom: 30px;
    letter-spacing: -2px;
}

.description {
    font-size: 32px;
    line-height: 1.4;
    color: #cccccc;
    max-width: 850px;
    margin: 0 auto;
}

.footer {
    position: absolute;
    bottom: 60px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #ff6a00;
    text-transform: uppercase;
}
</style>
</head>
<body>
    <div class="glow"></div>
    <div class="content">
        <div class="tag">AGÊNCIA PRIVADA | 2026</div>
        <div class="title" id="main-title">TÍTULO DO POST</div>
        <div class="description" id="main-desc">Descrição masterizada gerada pelo arquiteto de design.</div>
    </div>
    <div class="footer">INTELIGÊNCIA EM DESIGN</div>

    <script>
        // Função para injetar dados via Playwright
        function setContent(title, desc) {
            document.getElementById('main-title').innerText = title;
            document.getElementById('main-desc').innerText = desc;
        }
    </script>
</body>
</html>
