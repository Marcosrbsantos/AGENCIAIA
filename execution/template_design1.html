<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background-color: #050d09;
    background-image: url('file:///C:/Users/Admin/.gemini/antigravity/brain/bb885d9d-17c4-480d-8b96-bc832cb3e051/bg_atitudes_engajamento_1773454229947.png');
    background-size: cover;
    background-position: center center;
    font-family: 'Inter', sans-serif;
    color: white;
    position: relative;
    overflow: hidden;
}
.overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.75) 100%);
    z-index: 1;
}
.header {
    position: absolute;
    top: 60px; left: 60px; right: 60px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 2;
    font-weight: 600;
    font-size: 24px;
    letter-spacing: 1px;
}
.logo {
    border: 3px solid white;
    border-radius: 50px;
    padding: 8px 30px;
    font-size: 22px;
}
.studio-text {
    font-size: 24px;
    font-weight: 800;
}
.content {
    position: absolute;
    top: 48%; left: 35px; right: 35px;
    transform: translateY(-50%);
    z-index: 2;
}
.line1 {
    display: flex; align-items: center; gap: 20px;
    font-size: 54px; font-weight: 800;
    margin-bottom: -5px;
}
.line1 .underline { 
    border-bottom: 2px solid #ff7b00; 
    padding-bottom: 8px; 
}
.slash { 
    width: 25px; height: 45px; 
    background-color: #00e676; 
    transform: skewX(-20deg); 
}
.line1 .light { 
    font-weight: 400; 
    opacity: 0.95; 
}

.huge-title {
    font-size: 130px;
    font-weight: 900;
    color: #00e676;
    line-height: 0.85;
    margin: 0 0 15px -3px;
    letter-spacing: -3px;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(0, 230, 118, 0.2);
}

.subtext {
    font-size: 50px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -1px;
}
.orange { color: #ff7b00; }
.white { color: #ffffff; }

.footer {
    position: absolute;
    bottom: 60px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 2;
    font-size: 19px; color: #bbbbbb;
    font-weight: 400;
}
.footer-right {
    color: white; 
    font-weight: 800;
    font-size: 21px;
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="header">
    <div class="logo">omc</div>
    <div class="studio-text">Studio</div>
</div>

<div class="content">
    <div class="line1">
        <span class="underline">3 ATITUDES QUE</span>
        <div class="slash"></div>
        <span class="light">acabam com o seu</span>
    </div>
    <div class="huge-title">ENGAJAMENTO</div>
    <div class="subtext">
        <span class="orange">esforço jogado no lixo</span> <span class="white">tanto para</span><br>
        <span class="white">criadores</span> <span class="orange">quanto para marcas</span>
    </div>
</div>

<div class="footer">
    <div>branding | posicionamento de marca | design estratégico</div>
    <div class="footer-right">@omcdesignstudio</div>
</div>
</body>
</html>
